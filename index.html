<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>My Site</title>
  <style>
    :root{
      --bg:#0b0b0b;
      --ink:#7CFF6B;          /* 線の色 */
      --stroke:2px;
      --radius:20px;
    }

    *{ box-sizing:border-box; }
    body{
      margin:0;
      min-height:100svh;
      background:var(--bg);
      color:var(--ink);
      font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, "Noto Sans JP", sans-serif;
    }

    /* 上部ナビ */
    .topnav{
      position: relative;
      width: min(900px, 92vw);
      margin: 28px auto 0;
      display:flex;
      gap: 48px;
      align-items:center;
      justify-content:flex-start;
    }

    .topnav a{
      position: relative;
      display:inline-block;
      padding: 10px 18px;
      color: var(--ink);
      text-decoration:none;
      letter-spacing: .02em;
      line-height: 1;
    }

    /* 吹き出し本体（角丸枠） */
    .topnav a::before{
      content:"";
      position:absolute;
      inset: 0;
      border: var(--stroke) solid var(--ink);
      border-radius: var(--radius);
      opacity: 0;
      transform: scale(.98);
      transition: opacity .15s ease, transform .15s ease;
      pointer-events:none;
      /* うっすら発光（任意） */
      filter: drop-shadow(0 0 6px rgba(124,255,107,.25));
    }

    /* しっぽ（枠線だけの三角っぽい形） */
    .topnav a::after{
      content:"";
      position:absolute;
      width: 16px;
      height: 16px;
      left: 28px;                 /* しっぽの位置：文字に合わせて調整 */
      bottom: -9px;
      transform: rotate(45deg);
      border-left: var(--stroke) solid var(--ink);
      border-bottom: var(--stroke) solid var(--ink);
      opacity: 0;
      transition: opacity .15s ease;
      pointer-events:none;
      background: transparent;
      filter: drop-shadow(0 0 6px rgba(124,255,107,.25));
    }

    /* hover / keyboard focus で表示 */
    .topnav a:hover::before,
    .topnav a:focus-visible::before{
      opacity: 1;
      transform: scale(1);
    }
    .topnav a:hover::after,
    .topnav a:focus-visible::after{
      opacity: 1;
    }

    /* デモ用の顔（スケッチの丸） */
    .face{
      width: 140px;
      height: 140px;
      border: var(--stroke) solid var(--ink);
      border-radius: 50%;
      margin: 80px auto 0;
      position: relative;
      filter: drop-shadow(0 0 10px rgba(124,255,107,.18));
    }
    .eye{
      position:absolute;
      top: 42px;
      width: 12px;
      height: 28px;
      border-radius: 6px;
      background: var(--ink);
      opacity:.8;
    }
    .eye.left{ left: 46px; }
    .eye.right{ right: 46px; }
    .mouth{
      position:absolute;
      left: 50%;
      top: 86px;
      width: 44px;
      height: 0;
      border-top: var(--stroke) solid rgba(124,255,107,.8);
      transform: translateX(-50%);
      border-radius: 999px;
    }
  </style>
</head>
<body>
  <nav class="topnav" aria-label="Primary">
    <a href="/about/">about</a>
    <a href="/daily/">daily text</a>
    <a href="/gallery/">gallery</a>
  </nav>

  <div class="face" aria-hidden="true">
    <span class="eye left"></span>
    <span class="eye right"></span>
    <span class="mouth"></span>
  </div>
</body>
</html>
