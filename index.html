<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Top Page</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Caveat:wght@400;700&display=swap');

        :root {
            --bg-color: #05070c;
            --line-color: #68d15d;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            background: var(--bg-color);
            color: var(--line-color);
            font-family: 'Caveat', cursive, sans-serif;
            overflow: hidden;
        }

        .container {
            width: min(920px, 92vw);
            min-height: 70vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding-top: 40px;
            gap: 90px;
        }

        .menu {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 12px;
            font-size: clamp(2.2rem, 5vw, 3.4rem);
            line-height: 1;
        }

        .menu-item {
            position: relative;
            text-decoration: none;
            color: inherit;
            padding: 8px 22px 10px;
            border: 2px solid transparent;
            border-radius: 58% 42% 55% 45% / 40% 58% 42% 60%;
            transition: border-color 0.24s ease;
        }

        .menu-item:hover,
        .menu-item:focus-visible {
            border-color: var(--line-color);
            outline: none;
        }

        .menu-item::after {
            content: "";
            position: absolute;
            width: 58px;
            height: 74px;
            opacity: 0;
            pointer-events: none;
            border-left: 2px solid var(--line-color);
            border-bottom: 2px solid var(--line-color);
            border-radius: 0 0 95% 80%;
            transition: opacity 0.24s ease;
        }

        .menu-item:hover::after,
        .menu-item:focus-visible::after {
            opacity: 1;
        }

        .menu-item.about::after {
            left: 58%;
            top: calc(100% - 2px);
            transform: rotate(8deg);
        }

        .menu-item.daily::after {
            left: 44%;
            top: calc(100% - 2px);
            transform: rotate(-8deg) scaleX(-1);
        }

        .menu-item.gallery::after {
            left: 30%;
            top: calc(100% - 2px);
            transform: rotate(-16deg) scaleX(-1);
        }

        .face {
            width: clamp(110px, 18vw, 170px);
            aspect-ratio: 1 / 1;
            border: 2px solid var(--line-color);
            border-radius: 50%;
            overflow: hidden;
            transform: rotate(-2deg);
            box-shadow: 0 0 0 1px color-mix(in srgb, var(--line-color) 30%, transparent);
        }

        .face img {
            width: 100%;
            height: 100%;
            display: block;
            object-fit: cover;
        }
    </style>
</head>
<body>
    <main class="container">
        <nav class="menu" aria-label="Main menu">
            <a href="about.html" class="menu-item about">about</a>
            <a href="daily-text.html" class="menu-item daily">daily text</a>
            <a href="gallery.html" class="menu-item gallery">gallery</a>
        </nav>

        <div class="face">
            <img src="face.png" alt="中央の顔イラスト" loading="lazy">
        </div>
    </main>
</body>
</html>
