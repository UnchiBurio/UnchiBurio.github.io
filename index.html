<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hand-drawn Style Top Page</title>
    <style>
        /* 手書き風のフォントをGoogle Fontsから読み込み */
        @import url('https://fonts.googleapis.com/css2?family=Caveat:wght@400;700&display=swap');

        :root {
            --bg-color: #151515; /* 背景の黒（少しだけグレー寄り） */
            --line-color: #7bc043; /* 線の緑色 */
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--line-color);
            font-family: 'Caveat', cursive, sans-serif; /* 手書きフォントを適用 */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        /* 全体のレイアウト */
        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 80px; /* メニューと顔の間の距離 */
        }

        /* メニュー部分 */
        .menu {
            display: flex;
            gap: 40px; /* リンク同士の隙間 */
        }

        .menu-item {
            position: relative;
            text-decoration: none;
            color: var(--line-color);
            font-size: 2.5rem;
            padding: 10px 25px;
            border: 2px solid transparent; /* 通常時は枠線を透明に */
            /* 手書き風の少し歪んだ角丸 */
            border-radius: 255px 15px 225px 15px/15px 225px 15px 255px;
            transition: border-color 0.3s ease;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* ホバー時（カーソルを重ねた時）に枠線を表示 */
        .menu-item:hover {
            border-color: var(--line-color);
        }

        .menu-item .text {
            position: relative;
            z-index: 2;
        }

        /* 吹き出しの「しっぽ」の共通設定 */
        .tail {
            position: absolute;
            opacity: 0; /* 通常時は非表示 */
            transition: opacity 0.3s ease;
            pointer-events: none;
            z-index: 3;
        }

        /* ホバー時にしっぽを表示 */
        .menu-item:hover .tail {
            opacity: 1;
        }

        /* 各リンクごとのしっぽの位置と形（SVG） */
        /* about (左) : 右下に向かって伸びる */
        .tail-about {
            bottom: -58px;
            right: 15px;
        }
        /* daily text (中央) : 真下に向かって伸びる */
        .tail-daily {
            bottom: -48px;
            left: 50%;
            transform: translateX(-50%);
        }
        /* gallary (右) : 左下に向かって伸びる */
        .tail-gallery {
            bottom: -58px;
            left: 15px;
        }

        /* 中央の顔のイラスト（CSSで描画） */
        .face {
            width: 100px;
            height: 100px;
            border: 2px solid var(--line-color);
            /* 少し歪んだ円 */
            border-radius: 48% 52% 51% 49% / 51% 48% 52% 49%;
            position: relative;
        }

        .eye {
            width: 2px;
            height: 18px;
            background-color: var(--line-color);
            position: absolute;
            top: 30px;
            border-radius: 2px;
        }
        .eye.left { left: 30px; transform: rotate(3deg); }
        .eye.right { right: 30px; transform: rotate(-2deg); }

        .mouth {
            width: 30px;
            height: 2px;
            background-color: var(--line-color);
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) rotate(-2deg);
            border-radius: 2px;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- ナビゲーションメニュー -->
        <nav class="menu">
            <a href="#about" class="menu-item">
                <span class="text">about</span>
                <!-- 吹き出しのしっぽ (SVG) -->
                <svg class="tail tail-about" width="50" height="60" viewBox="0 0 50 60">
                    <!-- fillで背景色と同じ色を塗り、枠線を隠して吹き出しの口を作っています -->
                    <path d="M 10 0 Q 25 30 50 60 Q 35 30 40 0" fill="#151515" stroke="#7bc043" stroke-width="2" />
                </svg>
            </a>
            
            <a href="#daily" class="menu-item">
                <span class="text">daily text</span>
                <svg class="tail tail-daily" width="40" height="50" viewBox="0 0 40 50">
                    <path d="M 10 0 Q 20 25 20 50 Q 20 25 30 0" fill="#151515" stroke="#7bc043" stroke-width="2" />
                </svg>
            </a>
            
            <a href="#gallery" class="menu-item">
                <span class="text">gallary</span>
                <svg class="tail tail-gallery" width="50" height="60" viewBox="0 0 50 60">
                    <path d="M 40 0 Q 25 30 0 60 Q 15 30 10 0" fill="#151515" stroke="#7bc043" stroke-width="2" />
                </svg>
            </a>
        </nav>

        <!-- 顔のイラスト -->
        <div class="face">
            <div class="eye left"></div>
            <div class="eye right"></div>
            <div class="mouth"></div>
        </div>
    </div>

</body>
</html>
