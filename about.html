  <script>
    (() => {
      const stage = document.querySelector('.preview-stage');
      if (!stage) return;
      const motionPathRules = [];
      const motionPathRuleMap = new Map(motionPathRules.map((rule) => [rule.id, rule]));
      const motionPathRulesByTarget = new Map();
      const motionPathStates = new Map();
      let motionPathFrameId = 0;
      motionPathRules.forEach((rule) => {
        rule.targetIds.forEach((targetId) => {
          if (!motionPathRulesByTarget.has(targetId)) motionPathRulesByTarget.set(targetId, []);
          motionPathRulesByTarget.get(targetId).push(rule);
        });
      });
      const readRuleIds = (attributeName) => Array.from(stage.querySelectorAll('[' + attributeName + ']'))
        .flatMap((element) => String(element.getAttribute(attributeName) || '').split(/s+/).filter(Boolean));
      const clamp01 = (value) => Math.max(0, Math.min(1, value));
      const applyEasing = (name, value) => {
        const t = clamp01(value);
        if (name === 'linear') return t;
        if (name === 'ease-in') return t * t * t;
        if (name === 'ease-out') return 1 - ((1 - t) * (1 - t) * (1 - t));
        if (name === 'ease-in-out') {
          return t < 0.5
            ? 4 * t * t * t
            : 1 - Math.pow(-2 * t + 2, 3) / 2;
        }
        return t < 0.5
          ? 4 * t * t * t
          : 1 - Math.pow(-2 * t + 2, 3) / 2;
      };
      const buildSampledMotionPath = (path) => {
        const points = Array.isArray(path)
          ? path.map((point) => ({ x: Number(point?.x) || 0, y: Number(point?.y) || 0 }))
          : [];
        if (points.length < 2) return null;
        const segments = [];
        let totalLength = 0;
        for (let index = 1; index < points.length; index += 1) {
          const from = points[index - 1];
          const to = points[index];
          const length = Math.hypot(to.x - from.x, to.y - from.y);
          if (length <= 0.001) continue;
          segments.push({ from, to, length, start: totalLength, end: totalLength + length });
          totalLength += length;
        }
        if (!segments.length || totalLength <= 0.001) return null;
        return { points, segments, totalLength };
      };
      const sampleMotionPath = (sampledPath, progress) => {
        if (!sampledPath) return { x: 0, y: 0 };
        const distance = sampledPath.totalLength * clamp01(progress);
        const segment = sampledPath.segments.find((entry) => distance <= entry.end) || sampledPath.segments[sampledPath.segments.length - 1];
        if (!segment) return { x: 0, y: 0 };
        const segmentProgress = segment.length <= 0.001 ? 1 : (distance - segment.start) / segment.length;
        return {
          x: segment.from.x + (segment.to.x - segment.from.x) * segmentProgress,
          y: segment.from.y + (segment.to.y - segment.from.y) * segmentProgress,
        };
      };
      const applyMotionPathOverride = (node, point) => {
        node.style.setProperty('--interaction-translate-x', '0px');
        node.style.setProperty('--interaction-translate-y', '0px');
        node.style.setProperty('transform', 'translate(' + String(point.x) + 'px, ' + String(point.y) + 'px)');
      };
      const clearMotionPathOverride = (node) => {
        node.style.removeProperty('transform');
        node.style.removeProperty('--interaction-translate-x');
        node.style.removeProperty('--interaction-translate-y');
      };
      const ensureMotionPathAnimationLoop = () => {
        if (motionPathFrameId) return;
        const tick = (timestamp) => {
          let hasRunningAnimation = false;
          motionPathStates.forEach((state, targetId) => {
            const node = stage.querySelector('.preview-node[data-item-id="' + targetId + '"]');
            if (!node) {
              motionPathStates.delete(targetId);
              return;
            }
            const rule = motionPathRuleMap.get(state.ruleId || '');
            if (!rule || !state.sampledPath) {
              clearMotionPathOverride(node);
              motionPathStates.delete(targetId);
              return;
            }
            const delayMs = Math.max(0, Number(rule.delayMs) || 0);
            const durationMs = Math.max(1, Number(rule.durationMs) || 1);
            const elapsedMs = Math.max(0, timestamp - state.startedAt - delayMs);
            const rawProgress = clamp01(elapsedMs / durationMs);
            const easedProgress = applyEasing(rule.easing, rawProgress);
            const currentProgress = state.fromProgress + (state.toProgress - state.fromProgress) * easedProgress;
            const point = sampleMotionPath(state.sampledPath, currentProgress);
            applyMotionPathOverride(node, point);
            state.currentProgress = currentProgress;
            if (rawProgress < 1) {
              hasRunningAnimation = true;
              return;
            }
            if (state.toProgress <= 0.001) {
              clearMotionPathOverride(node);
              motionPathStates.delete(targetId);
            }
          });
          motionPathFrameId = hasRunningAnimation ? window.requestAnimationFrame(tick) : 0;
        };
        motionPathFrameId = window.requestAnimationFrame(tick);
      };
      const isMotionRuleActive = (rule, activeHoverRules, activeClickRules) => {
        if (rule.trigger === 'hover') return activeHoverRules.has(rule.id);
        if (rule.trigger === 'click') return activeClickRules.has(rule.id);
        return stage.classList.contains('is-enter-ready');
      };
      const syncMotionPathStyles = () => {
        const activeHoverRules = new Set(String(stage.getAttribute('data-active-hover-rules') || '').split(/s+/).filter(Boolean));
        const activeClickRules = new Set(String(stage.getAttribute('data-active-click-rules') || '').split(/s+/).filter(Boolean));
        motionPathRulesByTarget.forEach((rules, targetId) => {
          const node = stage.querySelector('.preview-node[data-item-id="' + targetId + '"]');
          if (!node) return;
          const activeCandidates = rules.filter((rule) => isMotionRuleActive(rule, activeHoverRules, activeClickRules));
          const activeRule = activeCandidates[activeCandidates.length - 1] || null;
          const currentState = motionPathStates.get(targetId);
          if (activeRule) {
            const sampledPath = buildSampledMotionPath(activeRule.path);
            if (!sampledPath) return;
            if (currentState && currentState.ruleId === activeRule.id && currentState.toProgress === 1) return;
            motionPathStates.set(targetId, {
              ruleId: activeRule.id,
              sampledPath,
              fromProgress: currentState?.currentProgress || 0,
              toProgress: 1,
              currentProgress: currentState?.currentProgress || 0,
              startedAt: performance.now(),
            });
            ensureMotionPathAnimationLoop();
            return;
          }
          if (!currentState) {
            clearMotionPathOverride(node);
            return;
          }
          if (currentState.toProgress === 0) return;
          motionPathStates.set(targetId, {
            ...currentState,
            fromProgress: currentState.currentProgress || 0,
            toProgress: 0,
            startedAt: performance.now(),
          });
          ensureMotionPathAnimationLoop();
        });
      };
      const updateHoverRuleState = () => {
        const active = new Set(String(stage.getAttribute('data-active-hover-rules') || '').split(/s+/).filter(Boolean));
        const enterHovered = new Set(Array.from(stage.querySelectorAll('[data-hover-enter-rules]'))
          .filter((element) => element.matches(':hover'))
          .flatMap((element) => String(element.getAttribute('data-hover-enter-rules') || '').split(/s+/).filter(Boolean)));
        const leaveHovered = new Set(Array.from(stage.querySelectorAll('[data-hover-leave-rules]'))
          .filter((element) => element.matches(':hover'))
          .flatMap((element) => String(element.getAttribute('data-hover-leave-rules') || '').split(/s+/).filter(Boolean)));
        const knownRuleIds = new Set([...active, ...readRuleIds('data-hover-enter-rules'), ...readRuleIds('data-hover-leave-rules')]);
        knownRuleIds.forEach((ruleId) => {
          if (enterHovered.has(ruleId)) {
            active.add(ruleId);
            return;
          }
          if (!leaveHovered.has(ruleId)) {
            active.delete(ruleId);
          }
        });
        stage.setAttribute('data-active-hover-rules', Array.from(active).join(' '));
        syncMotionPathStyles();
      };
      requestAnimationFrame(() => {
        stage.classList.add('is-enter-ready');
        updateHoverRuleState();
        syncMotionPathStyles();
      });
      ['pointermove', 'pointerover', 'pointerout'].forEach((eventName) => {
        stage.addEventListener(eventName, updateHoverRuleState);
      });
      stage.addEventListener('pointerleave', () => {
        stage.setAttribute('data-active-hover-rules', '');
        syncMotionPathStyles();
      });
      stage.addEventListener('click', (event) => {
        const source = event.target instanceof Element ? event.target.closest('[data-click-rules]') : null;
        if (!source) return;
        const rules = String(source.getAttribute('data-click-rules') || '').split(/\s+/).filter(Boolean);
        if (!rules.length) return;
        const active = new Set(String(stage.getAttribute('data-active-click-rules') || '').split(/\s+/).filter(Boolean));
        rules.forEach((ruleId) => {
          if (active.has(ruleId)) active.delete(ruleId);
          else active.add(ruleId);
        });
        stage.setAttribute('data-active-click-rules', Array.from(active).join(' '));
        syncMotionPathStyles();
      });
    })();
